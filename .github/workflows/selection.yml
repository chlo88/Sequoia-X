name: 'Sequoia-X 选股'

on:
  schedule:
    # UTC 7:15 = 北京时间 15:15，周一到周五（交易日）
    - cron: '15 7 * * 1-5'
  workflow_dispatch:

jobs:
  stock-selection:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install .

      - name: Restore database cache
        uses: actions/cache@v4
        id: restore-cache
        with:
          path: data/sequoia_v2.db
          key: sequoia-v2-db-v1

      - name: Create data directory
        run: mkdir -p data

      - name: Backfill historical data (first run only)
        if: steps.restore-cache.outputs.cache-hit != 'true'
        run: python main.py --backfill
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}

      - name: Daily selection + Feishu push
        if: steps.restore-cache.outputs.cache-hit == 'true'
        run: python main.py
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}

      - name: Save database cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: data/sequoia_v2.db
          key: sequoia-v2-db-v1-${{ github.run_id }}
