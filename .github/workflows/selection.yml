name: 'Sequoia-X 选股'

on:
  schedule:
    # UTC 7:15 = 北京时间 15:15，周一到周五（交易日）
    - cron: '15 7 * * 1-5'
  workflow_dispatch:

jobs:
  stock-selection:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install .

      - name: Create data directory
        run: mkdir -p data

      - name: Download pre-built database
        run: |
          gh release download db-v1 --repo chlo88/Sequoia-X --pattern "sequoia_v2.db.gz" --dir data/
          gunzip data/sequoia_v2.db.gz
          ls -lh data/sequoia_v2.db
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Daily selection + Feishu push
        run: python main.py
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
